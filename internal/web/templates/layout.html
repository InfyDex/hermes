{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes - {{ .Title }}</title>
    <meta property="og:title" content="Hermes - {{ .Title }}">
    <meta property="og:image" content="/static/hermes.png">
    <meta property="og:description" content="Lightweight self-hosted cron scheduler for homelab environments.">
    <link rel="icon" type="image/png" href="/static/hermes.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#c9d1d9;line-height:1.5}
        a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
        .navbar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:24px}
        .navbar h1{font-size:18px;color:#f0f6fc}.navbar a{color:#8b949e;font-size:14px}.navbar a:hover{color:#f0f6fc}
        .container{max-width:1200px;margin:0 auto;padding:24px}
        h2{color:#f0f6fc;margin-bottom:16px}
        .btn{display:inline-block;padding:6px 16px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:14px;text-decoration:none}
        .btn:hover{background:#30363d;text-decoration:none}
        .btn-primary{background:#238636;border-color:#2ea043;color:#fff}.btn-primary:hover{background:#2ea043}
        .btn-danger{background:#da3633;border-color:#f85149;color:#fff}.btn-danger:hover{background:#f85149}
        .btn-sm{padding:3px 10px;font-size:12px}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #21262d;font-size:14px}
        th{color:#8b949e;font-weight:600;background:#161b22}tr:hover{background:#161b22}
        .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
        .badge-success{background:#0d4429;color:#3fb950}.badge-running{background:#0c2d6b;color:#58a6ff}
        .badge-failed{background:#490202;color:#f85149}.badge-canceled{background:#3d2004;color:#d29922}
        .badge-disabled{background:#21262d;color:#8b949e}.badge-enabled{background:#0d4429;color:#3fb950}
        .form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:4px;font-size:14px;color:#8b949e}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;font-family:inherit}
        .form-group textarea{min-height:80px;resize:vertical}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#58a6ff}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-check{display:flex;align-items:center;gap:8px}.form-check input{width:auto}
        .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .log-viewer{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:16px;font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;max-height:600px;overflow-y:auto}
        .actions{display:flex;gap:8px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .empty-state{text-align:center;padding:48px;color:#8b949e}
        code{background:#21262d;padding:2px 6px;border-radius:4px;font-size:13px}
    </style>
</head>
<body>
    <nav class="navbar">
        <h1 style="display: flex; align-items: center;"><img src="/static/hermes.png" alt="Hermes Icon" style="height: 20px; width: 20px; margin-right: 8px;"> Hermes</h1>
        <a href="/">Dashboard</a>
        <a href="/jobs/new">New Job</a>
    </nav>
    <div class="container">
        {{ template "content" . }}
    </div>
</body>
</html>
{{ end }}
