{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes - {{ .Title }}</title>
    <meta property="og:title" content="Hermes - {{ .Title }}">
    <meta property="og:image" content="/static/hermes.png">
    <meta property="og:description" content="Lightweight self-hosted cron scheduler for homelab environments.">
    <link rel="icon" type="image/png" href="/static/hermes.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#c9d1d9;line-height:1.5}
        a{color:#58a6ff;text-decoration:none}a:hover{text-decoration:underline}
        .navbar{background:#161b22;border-bottom:1px solid #30363d;padding:12px 24px;display:flex;align-items:center;gap:24px}
        .navbar h1{font-size:18px;color:#f0f6fc}.navbar a{color:#8b949e;font-size:14px}.navbar a:hover{color:#f0f6fc}
        .container{max-width:1200px;margin:0 auto;padding:24px}
        h2{color:#f0f6fc;margin-bottom:16px}
        .btn{display:inline-flex;align-items:center;justify-content:center;padding:6px 16px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:14px;text-decoration:none;font-family:inherit;line-height:1.5;margin:0}
        .btn:hover{background:#30363d;text-decoration:none}
        .btn-primary{background:#238636;border-color:#2ea043;color:#fff}.btn-primary:hover{background:#2ea043}
        .btn-danger{background:#da3633;border-color:#f85149;color:#fff}.btn-danger:hover{background:#f85149}
        .btn-sm{padding:3px 10px;font-size:12px}
        table{width:100%;border-collapse:collapse;margin-top:12px}
        th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #21262d;font-size:14px}
        th{color:#8b949e;font-weight:600;background:#161b22}tr:hover{background:#161b22}
        .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
        .badge-success{background:#0d4429;color:#3fb950}.badge-running{background:#0c2d6b;color:#58a6ff}
        .badge-failed{background:#490202;color:#f85149}.badge-canceled{background:#3d2004;color:#d29922}
        .badge-disabled{background:#21262d;color:#8b949e}.badge-enabled{background:#0d4429;color:#3fb950}
        .form-group{margin-bottom:16px}.form-group label{display:block;margin-bottom:4px;font-size:14px;color:#8b949e}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:14px;font-family:inherit}
        .form-group textarea{min-height:80px;resize:vertical}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#58a6ff}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-check{display:flex;align-items:center;gap:8px}.form-check input{width:auto}
        .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px;margin-bottom:16px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .log-viewer{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:16px;font-family:"SFMono-Regular",Consolas,monospace;font-size:13px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;max-height:600px;overflow-y:auto}
        .actions{display:flex;align-items:center;gap:8px}
        .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
        .empty-state{text-align:center;padding:48px;color:#8b949e}
        code{background:#21262d;padding:2px 6px;border-radius:4px;font-size:13px}
        .notif-bell{background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px;position:relative;padding:4px}
        .notif-bell:hover{color:#f0f6fc}
        .notif-badge{position:absolute;top:-2px;right:-4px;background:#f85149;color:#fff;font-size:10px;font-weight:bold;padding:2px 4px;border-radius:10px;min-width:16px;text-align:center;line-height:1}
        .notifications-dropdown{position:relative}
        .notif-menu{display:none;position:absolute;top:100%;right:0;width:320px;background:#161b22;border:1px solid #30363d;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.2);margin-top:8px;z-index:100;overflow:hidden}
        .notif-menu.show{display:block}
        .notif-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #30363d;background:#21262d}
        .notif-header h3{font-size:14px;margin:0;color:#f0f6fc}
        .notif-list{max-height:300px;overflow-y:auto}
        .notif-item{padding:12px 16px;border-bottom:1px solid #30363d;display:flex;flex-direction:column;gap:4px;font-size:13px}
        .notif-item:last-child{border-bottom:none}
        .notif-item.unread{background:#0d1117}
        .notif-title{font-weight:600;color:#c9d1d9}
        .notif-msg{color:#8b949e}
        .notif-time{font-size:11px;color:#8b949e;margin-top:4px}
        .notif-empty{padding:24px;text-align:center;color:#8b949e;font-size:13px}
        .notif-level-info{border-left:3px solid #58a6ff}
        .notif-level-success{border-left:3px solid #3fb950}
        .notif-level-warning{border-left:3px solid #d29922}
        .notif-level-error{border-left:3px solid #f85149}
    </style>
</head>
<body>
    <nav class="navbar">
        <h1 style="display: flex; align-items: center;"><img src="/static/hermes.png" alt="Hermes Icon" style="height: 20px; width: 20px; margin-right: 8px;"> Hermes</h1>
        <a href="/">Dashboard</a>
        <a href="/jobs/new">New Job</a>
        
        <div style="margin-left: auto; display: flex; align-items: center;">
            <div class="notifications-dropdown" id="notif-dropdown">
                <button class="notif-bell" id="notif-bell" aria-label="Notifications">
                    🔔<span class="notif-badge" id="notif-badge" style="display: none;">0</span>
                </button>
                <div class="notif-menu" id="notif-menu">
                    <div class="notif-header">
                        <h3>Notifications</h3>
                        <button class="btn btn-sm" id="notif-read-all">Mark all read</button>
                    </div>
                    <div class="notif-list" id="notif-list">
                        <div class="notif-empty">Loading...</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">
        {{ template "content" . }}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bell = document.getElementById('notif-bell');
            const menu = document.getElementById('notif-menu');
            const badge = document.getElementById('notif-badge');
            const list = document.getElementById('notif-list');
            const readAllBtn = document.getElementById('notif-read-all');
            
            let notifications = [];

            // Toggle dropdown
            bell.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('show');
                if (menu.classList.contains('show') && notifications.length > 0) {
                    markAllRead();
                }
            });

            // Close when clicking outside
            document.addEventListener('click', (e) => {
                if (!menu.contains(e.target) && !bell.contains(e.target)) {
                    menu.classList.remove('show');
                }
            });

            readAllBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                markAllRead();
            });

            function renderNotifications() {
                if (!notifications || notifications.length === 0) {
                    badge.style.display = 'none';
                    list.innerHTML = '<div class="notif-empty">No new notifications</div>';
                    return;
                }

                const unreadCount = notifications.filter(n => !n.is_read).length;
                if (unreadCount > 0) {
                    badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }

                list.innerHTML = notifications.map(notif => {
                    const date = new Date(notif.created_at).toLocaleString();
                    return `
                        <div class="notif-item notif-level-${notif.level} ${notif.is_read ? '' : 'unread'}">
                            <div class="notif-title">${escapeHtml(notif.job_name)}</div>
                            <div class="notif-msg" style="word-wrap: break-word;">${escapeHtml(notif.message).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" style="color: #58a6ff;">Link</a>')}</div>
                            <div class="notif-time">${date}</div>
                        </div>
                    `;
                }).join('');
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe
                     .replace(/&/g, "&amp;")
                     .replace(/</g, "&lt;")
                     .replace(/>/g, "&gt;")
                     .replace(/"/g, "&quot;")
                     .replace(/'/g, "&#039;");
            }

            async function fetchNotifications() {
                try {
                    const res = await fetch('/api/notifications');
                    if (res.ok) {
                        const data = await res.json();
                        notifications = data || [];
                        renderNotifications();
                    }
                } catch (err) {
                    console.error('Failed to fetch notifications:', err);
                }
            }

            async function markAllRead() {
                try {
                    await fetch('/api/notifications/read', { method: 'POST' });
                    notifications.forEach(n => n.is_read = true);
                    renderNotifications();
                } catch (err) {
                    console.error('Failed to mark notifications read:', err);
                }
            }

            // Initial fetch
            fetchNotifications();
            // Poll every 30 seconds
            setInterval(fetchNotifications, 30000);
        });
    </script>
</body>
</html>
{{ end }}
